# ArgoCD Helm values — homelab (resource-conscious, admin via LAN/Tailscale only)
global:
  domain: argocd.homelab.local

server:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
  ingress:
    enabled: false

controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

applicationSet:
  enabled: true

configs:
  params:
    server.insecure: true
