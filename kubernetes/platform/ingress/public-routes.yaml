# Public ingress routes — only apps exposed via Cloudflare Tunnel
# Replace PUBLIC_DOMAIN with your domain (e.g. lab.example.com)
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: platform
  labels:
    app.kubernetes.io/name: whoami
spec:
  selector:
    app.kubernetes.io/name: whoami
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: platform
  labels:
    app.kubernetes.io/name: whoami
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: whoami
  template:
    metadata:
      labels:
        app.kubernetes.io/name: whoami
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10.3
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami-public
  namespace: platform
spec:
  entryPoints:
    - web
  routes:
    # Catch-all for tunnel validation; replace with Host(`api.yourdomain.com`) per app.
    - match: HostRegexp(`.*`)
      kind: Rule
      services:
        - name: whoami
          port: 80
