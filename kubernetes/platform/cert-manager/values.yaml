# cert-manager — homelab (TLS internal, optional origin certs)
crds:
  enabled: true

global:
  leaderElection:
    namespace: cert-manager

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

webhook:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 128Mi

cainjector:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 128Mi

startupapicheck:
  enabled: false
