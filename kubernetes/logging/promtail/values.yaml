config:
  clients:
    - url: http://loki.logging.svc.cluster.local:3100/loki/api/v1/push
  snippets:
    pipelineStages:
      - cri: {}
    extraRelabelConfigs:
      - action: replace
        source_labels:
          - __meta_kubernetes_namespace
        target_label: namespace
      - action: replace
        source_labels:
          - __meta_kubernetes_pod_name
        target_label: pod
      - action: replace
        source_labels:
          - __meta_kubernetes_container_name
        target_label: container

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

daemonset:
  enabled: true
