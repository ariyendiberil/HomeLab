# Search-only Elasticsearch — not primary transactional store (Postgres holds ledger).
# Sized for homelab RAM: 512m heap × 3 nodes; increase after adding hardware.
apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: banking-search
  namespace: banking-search
spec:
  version: 8.15.3
  http:
    tls:
      selfSignedCertificate:
        disabled: true
  nodeSets:
    - name: default
      count: 3
      config:
        node.store.allow_mmap: false
        node.roles:
          - master
          - data
          - ingest
      podTemplate:
        spec:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      elasticsearch.k8s.elastic.co/cluster-name: banking-search
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: elasticsearch
              env:
                - name: ES_JAVA_OPTS
                  value: -Xms512m -Xmx512m
              resources:
                requests:
                  cpu: 250m
                  memory: 1Gi
                limits:
                  memory: 1536Mi
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: local-path
            resources:
              requests:
                storage: 20Gi
