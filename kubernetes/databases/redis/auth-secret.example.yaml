# Copy to auth-secret.yaml and apply BEFORE redis sync, or run bootstrap/redis-auth-secret.sh
# Do not commit auth-secret.yaml with real password.
apiVersion: v1
kind: Secret
metadata:
  name: banking-redis-auth
  namespace: banking-cache
type: Opaque
stringData:
  password: "REPLACE-WITH-openssl-rand-base64-32"
