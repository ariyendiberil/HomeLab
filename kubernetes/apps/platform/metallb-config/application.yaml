# =============================================================================
#  ArgoCD Application: metallb-config (Manifests Config MetalLB)
#  -------------------------------------------------------------
#  File ini mendefinisikan konfigurasi MetalLB (seperti IPAddressPool,
#  L2Advertisement, dsb) yang diterapkan setelah MetalLB utama telah tersedia.
# 
#  Penggunaan:
#  - File ini digunakan bersama ArgoCD untuk menerapkan manifest konfigurasi
#    MetalLB yang berada di repo utama (di path: kubernetes/platform/metallb-config).
#  - Nilai sync-wave "1" memastikan bahwa konfigurasi ini baru diterapkan setelah
#    MetalLB core terinstall (aplikasi utama MetalLB harus sync-wave lebih rendah, ex: "0").
#  - Pastikan setiap perubahan di direktori kubernetes/platform/metallb-config
#    sudah sesuai dengan resource dan versi MetalLB yang sedang digunakan.
#
#  Penjelasan field utama:
#  - repoURL: Sumber Git repository untuk file-file config MetalLB.
#  - targetRevision: Branch atau commit yang digunakan.
#  - path: Direktori di repo git yang memuat manifest MetalLB Config.
#  - destination: Namespace target (default: metallb-system).
#  - syncPolicy: Aturan sync aplikasi di ArgoCD, termasuk auto-repair & prune.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/ariyendiberil/HomeLab.git
    targetRevision: main
    path: kubernetes/platform/metallb-config
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
 