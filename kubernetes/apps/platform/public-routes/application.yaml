apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: public-routes
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "17"
spec:
  project: default
  source:
    repoURL: https://github.com/ariyendiberil/HomeLab.git
    targetRevision: main
    path: kubernetes/platform/ingress
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
