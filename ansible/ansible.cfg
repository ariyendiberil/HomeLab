# =====================================================================================
# Ansible Configuration File (ansible.cfg)
#
# File ini berisi pengaturan utama untuk menjalankan Ansible pada project ini.
# Silakan sesuaikan parameter di bawah ini sesuai kebutuhan lingkungan Anda.
#
# Dokumentasi parameter:
# [defaults]                 - Konfigurasi default untuk Ansible
#   inventory                - Lokasi file inventory yang digunakan Ansible
#   host_key_checking        - Cek host key SSH (disarankan false untuk lab/local)
#   role_path                - Path role-role Ansible
#   remote_user              - User default yang digunakan saat koneksi SSH
#   deprecation_warnings     - Tampilkan peringatan fitur deprecated (False = tidak tampil)
#   interpreter_python       - Path interpreter python yang digunakan pada remote host
#
# [privilege_escalation]     - Pengaturan privilege escalation (menjalankan tugas dengan hak lebih tinggi)
#   become                   - Aktifkan privilege escalation (sudo/su)
#   become_method            - Metode privilege escalation yang digunakan
#   become_ask_pass          - Minta password sudo/su secara interaktif
#
# Referensi dokumentasi resmi Ansible: https://docs.ansible.com/ansible/latest/reference_appendices/config.html
# =====================================================================================
[defaults]
inventory = inventory/hosts.ini             
# Lokasi file daftar host yang dikelola Ansible
host_key_checking = false                   
# Nonaktifkan pemeriksaan host key SSH
roles_path = roles                          
# Path direktori peran (roles)
remote_user = ubuntu                       
# User remote default untuk SSH
deprecation_warnings = False               
# Nonaktifkan peringatan deprecated
interpreter_python = /usr/bin/python3     
 # Path python interpreter di remote host

[privilege_escalation]
become = True                             
# Aktifkan privilege escalation (sudo)
become_method = sudo                      
# Gunakan metode sudo
become_ask_pass = False                   
# Tidak meminta password sudo secara interaktif
