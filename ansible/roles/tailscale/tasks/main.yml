---
- name: Skip when Tailscale disabled
  ansible.builtin.meta: end_host
  when: not tailscale_enabled | bool

- name: Require auth key
  ansible.builtin.assert:
    that:
      - tailscale_authkey | length > 0
    fail_msg: "Set vault_tailscale_authkey in ansible/inventory/group_vars/vault.yml"

- name: Install Tailscale
  ansible.builtin.shell: curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/bin/tailscale

- name: Enable tailscaled service
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Join Tailscale network
  ansible.builtin.command: >
    tailscale up
    --authkey={{ tailscale_authkey }}
    --hostname={{ tailscale_hostname }}
    {{ tailscale_extra_args }}
  register: tailscale_up
  changed_when: true
  failed_when: tailscale_up.rc != 0 and 'already' not in (tailscale_up.stderr | default('')) and 'Logged out' not in (tailscale_up.stderr | default(''))

- name: Show Tailscale IP
  ansible.builtin.command: tailscale ip -4
  register: tailscale_ip
  changed_when: false

- name: Print Tailscale IP
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }} → {{ tailscale_ip.stdout }}"
